<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I'm Sorry</title>
    <!-- Importing a nice font -->
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #fff5f5;
            font-family: 'Poppins', sans-serif;
            text-align: center;
            color: #4a4a4a;
        }

        .container {
            padding: 20px;
            max-width: 90%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        h1 {
            font-size: 2.5rem;
            color: #ff4d4d;
            margin-bottom: 10px;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        button {
            background-color: #ff4d4d;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
            box-shadow: 0 4px 15px rgba(255, 77, 77, 0.3);
        }

        button:active {
            transform: scale(0.95);
            background-color: #e64444;
        }

        .emoji {
            font-size: 3rem;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="emoji">🥺</div>
        <h1>I'm So Sorry Khushii </h1>
        <p>I really messed up and I feel terrible about it.<br> 
           Can we please make things right? plz  plzzzz</p>
        <button onclick="forgiveMe()">I Forgive You</button>
    </div>

    <!-- Confetti Library -->
    <script src="https://jsdelivr.net"></script>
    
    <script>
        function forgiveMe() {
            // Heart-shaped/Pink confetti effect
            const duration = 3 * 1000;
            const end = Date.now() + duration;

            (function frame() {
                confetti({
                    particleCount: 3,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 },
                    colors: ['#ff4d4d', '#ff8080', '#ffb3b3']
                });
                confetti({
                    particleCount: 3,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 },
                    colors: ['#ff4d4d', '#ff8080', '#ffb3b3']
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());

            // Change text after clicking
            document.querySelector('h1').innerText = "Thank You!";
            document.querySelector('p').innerHTML = "You're the best. ❤️";
            document.querySelector('button').style.display = 'none';
        }
    </script>
</body>
</html>
